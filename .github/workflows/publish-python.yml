name: Publish Python Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-wheels:
    name: Build wheel on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install maturin
        run: python -m pip install "maturin>=1.8,<2.0"

      - name: Build wheel
        run: maturin build --release --manifest-path bindings/python/Cargo.toml --out bindings/python/dist

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v6
        with:
          name: python-wheel-${{ matrix.os }}
          path: bindings/python/dist/*

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install maturin
        run: python -m pip install "maturin>=1.8,<2.0"

      - name: Build source distribution
        run: maturin sdist --manifest-path bindings/python/Cargo.toml --out bindings/python/dist

      - name: Upload source distribution
        uses: actions/upload-artifact@v6
        with:
          name: python-sdist
          path: bindings/python/dist/*

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist]
    permissions:
      contents: read
      id-token: write
    environment: pypi
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: python-*
          merge-multiple: true

      - name: Publish distributions
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: false
          skip-existing: true
          verbose: true
